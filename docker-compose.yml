# ============================================================
# HS Education — Docker Compose (Full Stack Local Testing)
# Services: PostgreSQL + Backend API + Frontend (Nginx)
# Usage: docker-compose up --build
# ============================================================

version: "3.9"

services:

  # ── PostgreSQL ───────────────────────────────────────────
  db:
    image: postgres:16-alpine
    container_name: hse-db
    restart: unless-stopped
    environment:
      POSTGRES_DB:       hseducation
      POSTGRES_USER:     hse_user
      POSTGRES_PASSWORD: hse_password
    volumes:
      - hse_pgdata:/var/lib/postgresql/data
      - ./backend/app_db/01_schema.sql:/docker-entrypoint-initdb.d/01_schema.sql
      - ./backend/app_db/02_seed.sql:/docker-entrypoint-initdb.d/02_seed.sql
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hse_user -d hseducation"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Backend API ──────────────────────────────────────────
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: hse-backend
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      PORT:         5000
      DB_HOST:      db
      DB_PORT:      5432
      DB_NAME:      hseducation
      DB_USER:      hse_user
      DB_PASSWORD:  hse_password
      FRONTEND_URL: http://localhost:3000
    ports:
      - "5000:5000"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:5000/healthz"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  # ── Frontend ─────────────────────────────────────────────
  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: hse-frontend
    restart: unless-stopped
    depends_on:
      - backend
    environment:
      PORT: 3000
    ports:
      - "3000:3000"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/healthz"]
      interval: 30s
      timeout: 5s
      retries: 3

volumes:
  hse_pgdata:
    driver: local
